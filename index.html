<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exchange Rate Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 52px;
    }

    header .site-icon {
      font-size: 2.8rem;
      margin-bottom: 12px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #f7931a, #ffd166);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    header p {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.45);
      max-width: 360px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      width: min(860px, 100%);
    }

    .tool-card {
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 18px;
      padding: 32px 28px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background 0.2s;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    .tool-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.11);
      border-color: rgba(247, 147, 26, 0.45);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(247, 147, 26, 0.2);
    }

    .tool-card:active {
      transform: translateY(-1px);
    }

    .card-icon {
      font-size: 2.4rem;
      margin-bottom: 16px;
      line-height: 1;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f7931a;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .card-desc {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.6;
      flex: 1;
    }

    .card-arrow {
      margin-top: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(247, 147, 26, 0.75);
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.04em;
      transition: gap 0.2s, color 0.2s;
    }

    .tool-card:hover .card-arrow {
      gap: 10px;
      color: #f7931a;
    }

    footer {
      margin-top: 56px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.2);
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div class="site-icon">📊</div>
    <h1>Exchange Rate Dashboard</h1>
    <p>Real-time currency &amp; crypto exchange rates at a glance.</p>
  </header>

  <main class="grid">

    <a class="tool-card" href="bitcoin.html">
      <div class="card-icon">₿</div>
      <div class="card-title">Bitcoin Exchange Rate</div>
      <div class="card-desc">
        Live BTC price in USD &amp; THB with 24h change, Satoshi converter, and Bitcoin converter.
      </div>
      <div class="card-arrow">
        View rates
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </div>
    </a>

    <!-- Future cards will be added here -->

  </main>

  <footer>More exchange rates coming soon.</footer>

</body>
</html>
